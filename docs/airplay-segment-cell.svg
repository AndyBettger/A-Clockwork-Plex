<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
  width="280mm"
  height="400mm"
  viewBox="-4 -4 28 40"
  version="1.1"
  id="a-clockwork-plex-segment-cell">
  <title>A Clockwork Plex AirPlay alphanumeric segment cell</title>
  <desc>
    Editable source cell for the AirPlay 14/16-segment display.
    Edit the polygon points in Inkscape, then copy each segment's points
    back into app/static/js/airplay-mini-clock.js.
  </desc>
  <defs>
    <style><![CDATA[
      .guide {
        fill: none;
        stroke: #8fd3ff;
        stroke-opacity: 0.18;
        stroke-width: 0.18;
      }
      .segment {
        fill: rgba(143, 211, 255, 0.16);
        stroke: rgba(247, 249, 255, 0.35);
        stroke-width: 0.05;
      }
      .sample-on {
        fill: #8fd3ff;
        filter: drop-shadow(0 0 0.5px rgba(143, 211, 255, 0.55));
      }
      .label {
        fill: #8fd3ff;
        font-family: DejaVu Sans, Arial, sans-serif;
        font-size: 1.1px;
        font-weight: 700;
      }
    ]]></style>
  </defs>

  <g id="guides" inkscape:label="Guides">
    <rect id="cell-bounds" class="guide" x="0" y="0" width="20" height="32" rx="0.4" />
    <line id="vertical-centre" class="guide" x1="10" y1="0" x2="10" y2="32" />
    <line id="horizontal-centre" class="guide" x1="0" y1="16" x2="20" y2="16" />
  </g>

  <g id="segment-cell" inkscape:label="Segment cell - edit these polygons">
      <polygon id="segment-a" class="segment segment-a" points="3.00,2.10 4.72,3.24 15.28,3.24 17.00,2.10 15.28,0.96 4.72,0.96" />
      <polygon id="segment-b" class="segment segment-b" points="18.00,3.35 16.86,5.07 16.86,13.53 18.00,15.25 19.14,13.53 19.14,5.07" />
      <polygon id="segment-c" class="segment segment-c" points="18.00,16.75 16.86,18.47 16.86,26.93 18.00,28.65 19.14,26.93 19.14,18.47" />
      <polygon id="segment-d" class="segment segment-d" points="3.00,29.90 4.72,31.04 15.28,31.04 17.00,29.90 15.28,28.76 4.72,28.76" />
      <polygon id="segment-e" class="segment segment-e" points="2.00,16.75 0.86,18.47 0.86,26.93 2.00,28.65 3.14,26.93 3.14,18.47" />
      <polygon id="segment-f" class="segment segment-f" points="2.00,3.35 0.86,5.07 0.86,13.53 2.00,15.25 3.14,13.53 3.14,5.07" />
      <polygon id="segment-g1" class="segment segment-g1" points="3.25,16.00 4.97,17.14 7.83,17.14 9.55,16.00 7.83,14.86 4.97,14.86" />
      <polygon id="segment-g2" class="segment segment-g2" points="10.45,16.00 12.17,17.14 15.03,17.14 16.75,16.00 15.03,14.86 12.17,14.86" />
      <polygon id="segment-h" class="segment segment-h" points="3.80,3.65 3.54,5.70 7.86,14.42 9.65,15.45 9.91,13.40 5.59,4.68" />
      <polygon id="segment-i" class="segment segment-i" points="16.20,3.65 14.41,4.68 10.09,13.40 10.35,15.45 12.14,14.42 16.46,5.70" />
      <polygon id="segment-j" class="segment segment-j" points="3.80,28.35 5.59,27.32 9.91,18.60 9.65,16.55 7.86,17.58 3.54,26.30" />
      <polygon id="segment-k" class="segment segment-k" points="16.20,28.35 16.46,26.30 12.14,17.58 10.35,16.55 10.09,18.60 14.41,27.32" />
      <polygon id="segment-m" class="segment segment-m" points="10.00,3.40 8.86,5.12 8.86,13.63 10.00,15.35 11.14,13.63 11.14,5.12" />
      <polygon id="segment-n" class="segment segment-n" points="10.00,16.65 8.86,18.37 8.86,26.88 10.00,28.60 11.14,26.88 11.14,18.37" />
  </g>

  <g id="sample-eight" inkscape:label="Sample 8 overlay" transform="translate(0,0)" opacity="0.95">
    <use href="#segment-a" class="sample-on" />
    <use href="#segment-b" class="sample-on" />
    <use href="#segment-c" class="sample-on" />
    <use href="#segment-d" class="sample-on" />
    <use href="#segment-e" class="sample-on" />
    <use href="#segment-f" class="sample-on" />
    <use href="#segment-g1" class="sample-on" />
    <use href="#segment-g2" class="sample-on" />
  </g>

  <g id="segment-labels" inkscape:label="Segment labels" opacity="0.65">
    <text class="label" x="9.4" y="1.2">a</text>
    <text class="label" x="18.7" y="9.8">b</text>
    <text class="label" x="18.7" y="23.4">c</text>
    <text class="label" x="9.4" y="32.8">d</text>
    <text class="label" x="-1.2" y="23.4">e</text>
    <text class="label" x="-1.2" y="9.8">f</text>
    <text class="label" x="5.5" y="15.2">g1</text>
    <text class="label" x="12.0" y="15.2">g2</text>
    <text class="label" x="6.4" y="7.8">h</text>
    <text class="label" x="13.0" y="7.8">i</text>
    <text class="label" x="6.4" y="24.8">j</text>
    <text class="label" x="13.0" y="24.8">k</text>
    <text class="label" x="10.7" y="9.6">m</text>
    <text class="label" x="10.7" y="23.4">n</text>
  </g>
</svg>
