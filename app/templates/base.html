<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}A Clockwork Plex{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/typography.css') }}">
  {% block head %}{% endblock %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/visual-pass-2.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/visual-pass-3.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/visual-pass-4.css') }}">
</head>
<body class="mode-{{ state.mode }}" data-active-page="{{ active_page | default(state.mode) }}">
  <main class="screen">
    {% block content %}{% endblock %}
  </main>
  <footer class="status-bar">
    <span>A Clockwork Plex</span>
    <span>Mode: {{ state.mode }}</span>
    <span>{% if state.last_weather_update %}Weather: {{ state.last_weather_update }}{% else %}Weather: waiting{% endif %}</span>
  </footer>
  <script src="{{ url_for('static', filename='js/segment-display.js') }}"></script>
  <script src="{{ url_for('static', filename='js/segment-readouts.js') }}"></script>
  <script src="{{ url_for('static', filename='js/nav-drawer.js') }}"></script>
  <script src="{{ url_for('static', filename='js/mode-watch.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
