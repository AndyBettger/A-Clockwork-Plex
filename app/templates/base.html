<!doctype html>
<html lang="en-GB" data-legacy-default-mode="{{ config.dashboard.default_mode | default('clock') }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}A Clockwork Plex{% endblock %}</title>
  <script src="{{ url_for('static', filename='js/dashboard-preferences-bootstrap.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/typography.css') }}">
  {% block head %}{% endblock %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/audio-polish.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/fader-calibration.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/page-transitions.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/settings-autosave.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/settings-dashboard-preferences.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/plexamp-persistent.css') }}">
</head>
<body
  class="mode-{{ state.mode }} acp-page-booting"
  data-active-page="{{ active_page | default(state.mode) }}"
  data-default-mode="{{ config.dashboard.default_mode | default('clock') }}"
  data-idle-timeout-seconds="{{ config.dashboard.idle_timeout_seconds | default(180) }}"
>
  <main class="screen">
    {% block content %}{% endblock %}
  </main>

  <section
    class="persistent-plexamp"
    id="persistent-plexamp"
    aria-label="Plexamp embedded player"
    aria-hidden="true"
  >
    <div class="persistent-plexamp-loading" aria-hidden="true">Preparing Plexamp</div>
    <iframe
      class="persistent-plexamp-frame"
      id="persistent-plexamp-frame"
      src="{{ config.plexamp.url | default('http://localhost:32500') }}"
      title="Plexamp"
      allow="autoplay"
    ></iframe>
  </section>

  <footer class="status-bar">
    <span>A Clockwork Plex</span>
    <span>Mode: {{ state.mode }}</span>
    <span>{% if state.last_weather_update %}Weather: {{ state.last_weather_update }}{% else %}Weather: waiting{% endif %}</span>
  </footer>
  <script src="{{ url_for('static', filename='js/segment-display.js') }}"></script>
  <script src="{{ url_for('static', filename='js/segment-readouts.js') }}"></script>
  <script src="{{ url_for('static', filename='js/nav-layer.js') }}"></script>
  <script src="{{ url_for('static', filename='js/nav-drawer.js') }}"></script>
  <script src="{{ url_for('static', filename='js/nav-drawer-lifecycle.js') }}"></script>
  <script src="{{ url_for('static', filename='js/audio-polish.js') }}"></script>
  <script src="{{ url_for('static', filename='js/audio-state-isolation.js') }}"></script>
  <script src="{{ url_for('static', filename='js/airplay-start-commit.js') }}"></script>
  <script src="{{ url_for('static', filename='js/fader-calibration.js') }}"></script>
  <script src="{{ url_for('static', filename='js/plexamp-persistent.js') }}"></script>
  <script src="{{ url_for('static', filename='js/page-transitions.js') }}"></script>
  <script src="{{ url_for('static', filename='js/settings-autosave.js') }}"></script>
  <script src="{{ url_for('static', filename='js/settings-dashboard-preferences.js') }}"></script>
  <script src="{{ url_for('static', filename='js/idle-return.js') }}"></script>
  <script src="{{ url_for('static', filename='js/mode-watch.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
